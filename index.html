<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overload MC | الأناركي العربي الأقوى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ستايل أجنبي فخم */
        body { background-color: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; text-align: center; }
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://wallpaperaccess.com/full/127117.jpg'); background-size: cover; padding: 100px 20px; border-bottom: 5px solid #ff4500; }
        .status-box { background: rgba(255, 69, 0, 0.1); border: 2px solid #ff4500; display: inline-block; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .btn-copy { background: #ff4500; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-copy:hover { background: #e63e00; transform: scale(1.05); }
        .section { padding: 50px 20px; max-width: 1000px; margin: auto; border-bottom: 1px solid #333; }
        h2 { color: #ff4500; font-size: 35px; }
        .staff-card { display: inline-block; background: #1e1e1e; padding: 20px; margin: 10px; border-radius: 10px; min-width: 200px; }
        .staff-img { border-radius: 50%; border: 3px solid #ff4500; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>OVERLOAD MC</h1>
        <p>مرحباً بك في عالم الفوضى والأناركي.. لا قوانين، فقط القوة!</p>
        
        <div class="status-box">
            <p id="statusText">جاري فحص حالة السيرفر... <i class="fas fa-spinner fa-spin"></i></p>
            <button class="btn-copy" onclick="copyIP()">نسخ الـ IP للعب الآن</button>
        </div>
    </div>

    <div class="section">
        <h2>لماذا Overload MC؟</h2>
        <p>سيرفر أناركي حقيقي، متاح للجميع (Java & Bedrock). استمتع بأفضل أداء على لابتوب HP EliteBook القوي!</p>
        <div style="display: flex; justify-content: space-around; flex-wrap: wrap;">
            <div><i class="fas fa-bolt" style="font-size: 40px; color: yellow;"></i><h3>لا لاق</h3></div>
            <div><i class="fas fa-skull" style="font-size: 40px; color: red;"></i><h3>أناركي حقيقي</h3></div>
            <div><i class="fas fa-users" style="font-size: 40px; color: cyan;"></i><h3>مجتمع متفاعل</h3></div>
        </div>
    </div>

    <div class="section">
        <h2>فريق الإدارة</h2>
        <div class="staff-card">
            <img src="https://minotar.net/avatar/YourName/100.png" class="staff-img" id="ownerImg">
            <h3>Owner</h3>
            <p>المطور والمالك</p>
        </div>
    </div>

    <script>
        const serverIP = "Overloadmc.mcsh.io"; // غير ده للـ IP بتاعك

        // كود عشان ينسخ الـ IP
        function copyIP() {
            navigator.clipboard.writeText(serverIP);
            alert("تم نسخ الـ IP بنجاح! نراك في اللعبة.");
        }

        // كود فحص حالة السيرفر (API مجاني)
        async function updateStatus() {
            try {
                const response = await fetch('https://api.mcsrvstat.us/2/' + serverIP);
                const data = await response.json();
                const statusText = document.getElementById('statusText');
                if(data.online) {
                    statusText.innerHTML = `<span style="color: #00ff00;">● متصل الآن</span> | اللاعبين: ${data.players.online}/${data.players.max}`;
                } else {
                    statusText.innerHTML = `<span style="color: #ff0000;">● غير متصل الآن</span>`;
                }
            } catch (error) {
                document.getElementById('statusText').innerText = "حدث خطأ في جلب البيانات";
            }
        }
        updateStatus();
    </script>
</body>
</html>
